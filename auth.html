<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Authenticating...</title>
</head>
<body>
  <p>Authenticating, please wait...</p>
  <script src="https://res.cdn.office.net/teams-js/2.21.0/js/MicrosoftTeams.min.js"></script>
  <script>
    (function() {
      var CLIENT_ID = 'b41bc6ad-2fef-41bc-abea-196732e74ed1';
      var TENANT_ID = 'b41b72d0-4e9f-4c26-8a69-f949f367c91d';
      var REDIRECT_URI = 'https://vadimux.github.io/willbot/auth.html';
      var SCOPES = 'ChatMember.Read Chat.Read Chat.ReadWrite';

      // Check if silent mode was requested (no user interaction)
      var searchParams = new URLSearchParams(window.location.search);
      var isSilent = searchParams.get('silent') === 'true';

      // Check if we have a token in the URL hash (returning from login)
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var error = params.get('error');

      if (accessToken) {
        // We got the token! Send it back to Teams
        microsoftTeams.app.initialize().then(function() {
          microsoftTeams.authentication.notifySuccess(accessToken);
        });
      } else if (error) {
        // Auth error
        microsoftTeams.app.initialize().then(function() {
          microsoftTeams.authentication.notifyFailure(
            params.get('error_description') || error
          );
        });
      } else {
        // No token yet — redirect to Microsoft login
        var authUrl = 'https://login.microsoftonline.com/' + TENANT_ID +
          '/oauth2/v2.0/authorize' +
          '?client_id=' + encodeURIComponent(CLIENT_ID) +
          '&response_type=token' +
          '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
          '&scope=' + encodeURIComponent(SCOPES) +
          '&response_mode=fragment' +
          '&prompt=' + (isSilent ? 'none' : 'consent');

        window.location.href = authUrl;
      }
    })();
  </script>
</body>
</html>
