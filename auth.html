<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Authenticating...</title>
</head>
<body>
  <p>Authenticating, please wait...</p>
  <script src="https://res.cdn.office.net/teams-js/2.21.0/js/MicrosoftTeams.min.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script>
    (function() {
      var CLIENT_ID = 'b41bc6ad-2fef-41bc-abea-196732e74ed1';
      var TENANT_ID = 'b41b72d0-4e9f-4c26-8a69-f949f367c91d';

      microsoftTeams.app.initialize().then(function() {
        var msalApp = new msal.PublicClientApplication({
          auth: {
            clientId: CLIENT_ID,
            authority: 'https://login.microsoftonline.com/' + TENANT_ID,
            redirectUri: window.location.origin + '/willbot/auth.html'
          },
          cache: { cacheLocation: 'localStorage' }
        });

        return msalApp.handleRedirectPromise().then(function(response) {
          if (response && response.accessToken) {
            // We got the token from redirect
            microsoftTeams.authentication.notifySuccess(response.accessToken);
          } else {
            // No response yet, start login
            msalApp.acquireTokenRedirect({
              scopes: ['ChatMember.Read.Chat', 'Chat.Read']
            });
          }
        });
      }).catch(function(err) {
        microsoftTeams.authentication.notifyFailure(err.message || 'Auth failed');
      });
    })();
  </script>
</body>
</html>
